<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spol tilbake!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#c8221a;
  font-family: Arial Black, Arial, sans-serif;
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  user-select:none;
}
.logo {
  position:absolute; top:0; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; padding:18px 0 0;
}
.logo-cream {
  background:#f5e8ce; color:#c8221a;
  font-size:1.5rem; font-weight:900; font-style:italic;
  padding:5px 24px 6px; border-radius:6px;
}
.logo-sub {
  color:rgba(245,232,206,0.65); font-size:0.6rem;
  letter-spacing:3px; text-transform:uppercase;
  margin-top:4px; font-weight:700; padding-bottom:12px;
}
.footer-stripe {
  position:absolute; bottom:0; left:0; right:0;
  background:#2d5a27; height:44px;
  display:flex; align-items:center; justify-content:center;
}
.footer-text {
  color:rgba(245,232,206,0.75); font-size:0.6rem;
  letter-spacing:3px; text-transform:uppercase; font-weight:900; font-style:italic;
}
.main {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:28px;
  padding:100px 32px 60px; text-align:center; width:100%;
}
.screen { display:none; width:100%; }
.screen.active { display:block; }
.tagline { color:#f5e8ce; font-size:1.1rem; font-weight:900; font-style:italic; line-height:1.4; margin-bottom:16px; }
.btn-spotify {
  background:#f5e8ce; color:#c8221a; border:none; border-radius:50px;
  padding:16px 36px; font-size:1rem; font-weight:900; font-style:italic;
  font-family:inherit; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.pulse-wrap {
  position:relative; width:160px; height:160px;
  display:flex; align-items:center; justify-content:center; margin:0 auto;
}
.pulse-ring {
  position:absolute; border-radius:50%;
  background:rgba(245,232,206,0.15);
  animation:pulse 2s ease-out infinite;
}
.pulse-ring:nth-child(1){width:160px;height:160px;animation-delay:0s;}
.pulse-ring:nth-child(2){width:130px;height:130px;animation-delay:0.4s;}
.pulse-ring:nth-child(3){width:100px;height:100px;animation-delay:0.8s;}
@keyframes pulse {
  0%  {transform:scale(0.85);opacity:0.6;}
  50% {transform:scale(1.05);opacity:0.3;}
  100%{transform:scale(0.85);opacity:0.6;}
}
.note-icon {
  font-size:3.5rem; color:#f5e8ce; position:relative; z-index:2;
  animation:notebob 2s ease-in-out infinite;
}
@keyframes notebob {
  0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);}
}
.hint-text {
  color:rgba(245,232,206,0.7); font-size:0.8rem; font-weight:700;
  font-style:italic; letter-spacing:2px; text-transform:uppercase;
  animation:blink 2.5s ease-in-out infinite; margin-top:16px;
}
@keyframes blink { 0%,100%{opacity:0.7;} 50%{opacity:0.25;} }
.tap-area { position:absolute; inset:0; cursor:pointer; z-index:10; }
.reveal-card {
  background:#f5e8ce; border-radius:12px; padding:28px 24px;
  width:100%; max-width:320px; margin:0 auto;
  box-shadow:0 8px 32px rgba(0,0,0,0.35); position:relative; overflow:hidden;
}
.reveal-card::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:6px; background:#2d5a27;
}
.reveal-year { font-size:3.2rem; font-weight:900; font-style:italic; color:#c8221a; line-height:1; letter-spacing:-2px; }
.reveal-divider { height:2px; background:repeating-linear-gradient(90deg,#2d5a27 0,#2d5a27 4px,transparent 4px,transparent 8px); margin:14px 0; opacity:0.4; }
.reveal-artist { font-size:0.75rem; font-weight:900; text-transform:uppercase; letter-spacing:2.5px; color:#2d5a27; margin-bottom:6px; }
.reveal-title { font-size:1.3rem; font-weight:900; font-style:italic; color:#1a0800; line-height:1.2; }
.btn-back {
  background:transparent; border:2px solid rgba(245,232,206,0.5);
  border-radius:50px; padding:12px 28px; color:#f5e8ce;
  font-size:0.85rem; font-weight:900; font-style:italic;
  font-family:inherit; cursor:pointer; letter-spacing:1px; margin-top:16px;
}
.error-text { color:#f5e8ce; font-size:0.95rem; font-weight:700; line-height:1.6; text-align:center; }
.dot-wrap { display:flex; gap:8px; justify-content:center; }
.dot { width:10px; height:10px; border-radius:50%; background:#f5e8ce; opacity:0.4; animation:dotpop 1.2s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:0.2s;} .dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotpop { 0%,100%{transform:scale(1);opacity:0.4;} 50%{transform:scale(1.4);opacity:1;} }
.loading-text { color:rgba(245,232,206,0.8); font-size:0.85rem; font-weight:700; font-style:italic; letter-spacing:2px; margin-top:16px; animation:blink 1.5s ease-in-out infinite; }
</style>

var currentSong = null;
var player = null;
var deviceId = null;
var accessToken = null;

function show(id) {
  ['screen-login','screen-loading','screen-player','screen-reveal','screen-error']
    .forEach(function(s) {
      document.getElementById(s).classList.toggle('active', s === id);
    });
}

function showError(msg) {
  document.getElementById('error-msg').innerHTML = msg;
  show('screen-error');
}

function base64url(buf) {
  return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function doLogin() {
  var id = new URLSearchParams(location.search).get('id');
  if (id !== null) sessionStorage.setItem('song_id', id);
  var verifier = base64url(crypto.getRandomValues(new Uint8Array(48)));
  sessionStorage.setItem('pkce_verifier', verifier);
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)).then(function(hash) {
    var challenge = base64url(hash);
    var params = new URLSearchParams({
      response_type: 'code',
      client_id: CLIENT_ID,
      scope: 'streaming user-read-email user-read-private user-modify-playback-state user-read-playback-state',
      redirect_uri: REDIRECT_URI,
      code_challenge_method: 'S256',
      code_challenge: challenge
    });
    location.href = 'https://accounts.spotify.com/authorize?' + params;
  });
}

function getToken(code) {
  return fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code: code,
      redirect_uri: REDIRECT_URI,
      client_id: CLIENT_ID,
      code_verifier: sessionStorage.getItem('pkce_verifier')
    })
  }).then(function(r) { return r.json(); });
}

function loadSDK() {
  return new Promise(function(resolve) {
    window.onSpotifyWebPlaybackSDKReady = resolve;
    var s = document.createElement('script');
    s.src = 'https://sdk.scdn.co/spotify-player.js';
    document.head.appendChild(s);
  });
}

function initPlayer(token) {
  accessToken = token;
  return loadSDK().then(function() {
    player = new Spotify.Player({
      name: 'Spol tilbake!',
      getOAuthToken: function(cb) { cb(accessToken); },
      volume: 0.8
    });
    player.addListener('ready', function(data) {
      deviceId = data.device_id;
      // Retry transfer with backoff – 403 means player not ready yet
      function transferAndPlay(attempt) {
        fetch('https://api.spotify.com/v1/me/player', {
          method: 'PUT',
          headers: {'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json'},
          body: JSON.stringify({device_ids: [deviceId], play: false})
        }).then(function(r) {
          if (r.ok || r.status === 204) {
            setTimeout(playSong, 600);
          } else if (attempt < 5) {
            setTimeout(function(){ transferAndPlay(attempt + 1); }, 1000);
          } else {
            playSong(); // give up transferring, try playing directly
          }
        }).catch(function() {
          if (attempt < 3) setTimeout(function(){ transferAndPlay(attempt + 1); }, 1000);
          else playSong();
        });
      }
      setTimeout(function(){ transferAndPlay(1); }, 1500);
    });
    player.addListener('not_ready', function() {
      sessionStorage.removeItem('spotify_token');
      showError('Spotify ikke klar – prøv igjen.');
    });
    player.addListener('authentication_error', function() {
      sessionStorage.removeItem('spotify_token');
      show('screen-login');
    });
    player.addListener('initialization_error', function(e) {
      showError('Feil ved oppstart: ' + e.message);
    });
    player.connect();
  });
}

function playSong() {
  if (!currentSong || !deviceId) return;
  show('screen-loading');
  fetch('https://api.spotify.com/v1/me/player/play?device_id=' + deviceId, {
    method: 'PUT',
    headers: {
      'Authorization': 'Bearer ' + accessToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({uris: ['spotify:track:' + currentSong.id]})
  }).then(function(r) {
    if (r.ok || r.status === 204) {
      show('screen-player');
    } else {
      r.text().then(function(t) { showError('Spotify svarte: ' + r.status + ' – ' + t); });
    }
  }).catch(function(e) { showError('Nettverksfeil: ' + e.message); });
}

// Knytt knapper til funksjoner
document.getElementById('btn-login').addEventListener('click', doLogin);

document.getElementById('tap-area').addEventListener('click', function() {
  // Re-read from sessionStorage to be safe
  var safeIdx = parseInt(sessionStorage.getItem('song_id'), 10);
  var song = (!isNaN(safeIdx) && safeIdx >= 0 && safeIdx < SONGS.length)
    ? SONGS[safeIdx] : currentSong;
  document.getElementById('reveal-year').textContent   = song.year;
  document.getElementById('reveal-artist').textContent = song.artist;
  document.getElementById('reveal-title').textContent  = song.title;
  show('screen-reveal');
});

document.getElementById('btn-back').addEventListener('click', function() {
  show('screen-player');
});

document.getElementById('btn-retry').addEventListener('click', function() {
  location.href = '?id=' + (sessionStorage.getItem('song_id') || '0');
});

// Start
(function init() {
  var params  = new URLSearchParams(location.search);
  var code    = params.get('code');
  var songId  = params.get('id') !== null ? params.get('id') : sessionStorage.getItem('song_id');
  var idx     = parseInt(songId, 10);

  // If ?id= is in URL, always use that (fresh QR scan) and clear old stored value
  if (params.get('id') !== null) {
    sessionStorage.setItem('song_id', idx);
  }

  currentSong = (!isNaN(idx) && idx >= 0 && idx < SONGS.length) ? SONGS[idx] : null;

  if (!currentSong) {
    showError('Ugyldig kort-ID (' + songId + '). Skann QR-koden på nytt.');
    return;
  }
  // Always save the confirmed idx so reveal uses the right song
  sessionStorage.setItem('song_id', idx);

  if (code) {
    history.replaceState({}, '', '?id=' + idx);
    show('screen-loading');
    getToken(code).then(function(token) {
      if (token.access_token) {
        sessionStorage.setItem('spotify_token', token.access_token);
        initPlayer(token.access_token);
      } else {
        showError('Innlogging feilet: ' + (token.error_description || token.error || 'ukjent feil'));
      }
    }).catch(function(e) { showError('Feil: ' + e.message); });
    return;
  }

  var stored = sessionStorage.getItem('spotify_token');
  if (stored) {
    show('screen-loading');
    initPlayer(stored).catch(function() {
      sessionStorage.removeItem('spotify_token');
      show('screen-login');
    });
    return;
  }

  show('screen-login');
})();
</script>
