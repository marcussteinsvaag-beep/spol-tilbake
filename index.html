<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#c8221a;
  font-family: Arial Black, Arial, sans-serif;
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  user-select:none;
}
.logo {
  position:absolute; top:0; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; padding:18px 0 0;
}
.logo-cream {
  background:#f5e8ce; color:#c8221a;
  font-size:1.5rem; font-weight:900; font-style:italic;
  padding:5px 24px 6px; border-radius:6px;
}
.logo-sub {
  color:rgba(245,232,206,0.65); font-size:0.6rem;
  letter-spacing:3px; text-transform:uppercase;
  margin-top:4px; font-weight:700; padding-bottom:12px;
}
.footer-stripe {
  position:absolute; bottom:0; left:0; right:0;
  background:#2d5a27; height:44px;
  display:flex; align-items:center; justify-content:center;
}
.footer-text {
  color:rgba(245,232,206,0.75); font-size:0.6rem;
  letter-spacing:3px; text-transform:uppercase; font-weight:900; font-style:italic;
}
.main {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:28px;
  padding:100px 32px 60px; text-align:center; width:100%;
}
.screen { display:none; width:100%; }
.screen.active { display:block; }
.tagline { color:#f5e8ce; font-size:1.1rem; font-weight:900; font-style:italic; line-height:1.4; margin-bottom:16px; }
.btn-spotify {
  background:#f5e8ce; color:#c8221a; border:none; border-radius:50px;
  padding:16px 36px; font-size:1rem; font-weight:900; font-style:italic;
  font-family:inherit; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.pulse-wrap {
  position:relative; width:160px; height:160px;
  display:flex; align-items:center; justify-content:center; margin:0 auto;
}
.pulse-ring {
  position:absolute; border-radius:50%;
  background:rgba(245,232,206,0.15);
  animation:pulse 2s ease-out infinite;
}
.pulse-ring:nth-child(1){width:160px;height:160px;animation-delay:0s;}
.pulse-ring:nth-child(2){width:130px;height:130px;animation-delay:0.4s;}
.pulse-ring:nth-child(3){width:100px;height:100px;animation-delay:0.8s;}
@keyframes pulse {
  0%  {transform:scale(0.85);opacity:0.6;}
  50% {transform:scale(1.05);opacity:0.3;}
  100%{transform:scale(0.85);opacity:0.6;}
}
.note-icon {
  font-size:3.5rem; color:#f5e8ce; position:relative; z-index:2;
  animation:notebob 2s ease-in-out infinite;
}
@keyframes notebob {
  0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);}
}
.hint-text {
  color:rgba(245,232,206,0.7); font-size:0.8rem; font-weight:700;
  font-style:italic; letter-spacing:2px; text-transform:uppercase;
  animation:blink 2.5s ease-in-out infinite; margin-top:16px;
}
@keyframes blink { 0%,100%{opacity:0.7;} 50%{opacity:0.25;} }
.tap-area { position:absolute; inset:0; cursor:pointer; z-index:10; }
.reveal-card {
  background:#f5e8ce; border-radius:12px; padding:28px 24px;
  width:100%; max-width:320px; margin:0 auto;
  box-shadow:0 8px 32px rgba(0,0,0,0.35); position:relative; overflow:hidden;
}
.reveal-card::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:6px; background:#2d5a27;
}
.reveal-year { font-size:3.2rem; font-weight:900; font-style:italic; color:#c8221a; line-height:1; letter-spacing:-2px; }
.reveal-divider { height:2px; background:repeating-linear-gradient(90deg,#2d5a27 0,#2d5a27 4px,transparent 4px,transparent 8px); margin:14px 0; opacity:0.4; }
.reveal-artist { font-size:0.75rem; font-weight:900; text-transform:uppercase; letter-spacing:2.5px; color:#2d5a27; margin-bottom:6px; }
.reveal-title { font-size:1.3rem; font-weight:900; font-style:italic; color:#1a0800; line-height:1.2; }
.btn-back {
  background:transparent; border:2px solid rgba(245,232,206,0.5);
  border-radius:50px; padding:12px 28px; color:#f5e8ce;
  font-size:0.85rem; font-weight:900; font-style:italic;
  font-family:inherit; cursor:pointer; letter-spacing:1px; margin-top:16px;
}
.error-text { color:#f5e8ce; font-size:0.95rem; font-weight:700; line-height:1.6; text-align:center; }
.dot-wrap { display:flex; gap:8px; justify-content:center; }
.dot { width:10px; height:10px; border-radius:50%; background:#f5e8ce; opacity:0.4; animation:dotpop 1.2s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:0.2s;} .dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotpop { 0%,100%{transform:scale(1);opacity:0.4;} 50%{transform:scale(1.4);opacity:1;} }
.loading-text { color:rgba(245,232,206,0.8); font-size:0.85rem; font-weight:700; font-style:italic; letter-spacing:2px; margin-top:16px; animation:blink 1.5s ease-in-out infinite; }

.scan-screen { display:none; width:100%; }
.scan-screen.active { display:block; }

.scanner-wrap {
  position:relative;
  width:240px; height:240px;
  margin:0 auto;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
}

#scanner-video {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
}

.scanner-overlay {
  position:absolute;
  inset:0;
  border:3px solid #f5e8ce;
  border-radius:16px;
  pointer-events:none;
}

.scanner-corner {
  position:absolute;
  width:24px; height:24px;
  border-color:#f7c700;
  border-style:solid;
}
.scanner-corner.tl { top:8px;left:8px;border-width:3px 0 0 3px; }
.scanner-corner.tr { top:8px;right:8px;border-width:3px 3px 0 0; }
.scanner-corner.bl { bottom:8px;left:8px;border-width:0 0 3px 3px; }
.scanner-corner.br { bottom:8px;right:8px;border-width:0 3px 3px 0; }

.scan-line {
  position:absolute;
  left:12px; right:12px;
  height:2px;
  background:linear-gradient(90deg, transparent, #f7c700, transparent);
  animation:scanline 2s ease-in-out infinite;
}
@keyframes scanline {
  0%  { top:12px; opacity:1; }
  50% { top:calc(100% - 14px); opacity:1; }
  100%{ top:12px; opacity:1; }
}

.scan-hint {
  color:rgba(245,232,206,0.75);
  font-size:0.8rem;
  font-weight:700;
  font-style:italic;
  letter-spacing:1px;
  margin-top:20px;
  text-align:center;
}

.btn-scan {
  background:#f5e8ce;
  color:#c8221a;
  border:none;
  border-radius:50px;
  padding:14px 32px;
  font-size:1rem;
  font-weight:900;
  font-style:italic;
  font-family:inherit;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  margin-top:8px;
}

/* ── Hjemskjerm ── */
.home-btns {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  width:100%;
}

.btn-dice {
  background:#f7c700;
  color:#c8221a;
  border:none;
  border-radius:50px;
  padding:18px 40px;
  font-size:1.15rem;
  font-weight:900;
  font-style:italic;
  font-family:inherit;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  display:flex;
  align-items:center;
  gap:12px;
  width:240px;
  justify-content:center;
}

.btn-scan-home {
  background:#2d5a27;
  color:#f5e8ce;
  border:none;
  border-radius:50px;
  padding:18px 40px;
  font-size:1.15rem;
  font-weight:900;
  font-style:italic;
  font-family:inherit;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  display:flex;
  align-items:center;
  gap:12px;
  width:240px;
  justify-content:center;
}

.dice-icon {
  font-size:1.6rem;
  animation:none;
}

.dice-icon.rolling {
  animation:roll 0.4s ease-in-out;
}

@keyframes roll {
  0%   { transform:rotate(0deg) scale(1); }
  25%  { transform:rotate(90deg) scale(1.3); }
  50%  { transform:rotate(180deg) scale(1); }
  75%  { transform:rotate(270deg) scale(1.3); }
  100% { transform:rotate(360deg) scale(1); }
}

.mode-label {
  color:rgba(245,232,206,0.5);
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:4px;
}
</style>

      </button>
      <button class="btn-scan-home" id="btn-scan-home">
        📷 &nbsp;Skann kort
      </button>

  </div>

  <div id="screen-scan" class="screen scan-screen">

  <div id="screen-loading" class="screen">
    <div class="dot-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="loading-text">Laster sang...</div>
  </div>
  <div id="screen-player" class="screen" style="position:relative;">
    <div class="pulse-wrap">
      <div class="pulse-ring"></div><div class="pulse-ring"></div><div class="pulse-ring"></div>
      <div class="note-icon">♪</div>

    <div class="hint-text">Trykk for å avsløre</div>
    <div class="tap-area" id="tap-area"></div>

  <div id="screen-reveal" class="screen">
    <div class="reveal-card">
      <div class="reveal-year"  id="reveal-year"></div>
      <div class="reveal-divider"></div>
      <div class="reveal-artist" id="reveal-artist"></div>
      <div class="reveal-title"  id="reveal-title"></div>
    </div>
    <button class="btn-back" id="btn-back">↩ Hør igjen</button>
    <br><br>
    <button class="btn-scan" id="btn-next">🏠 &nbsp;Tilbake til start</button>
  </div>
  <div id="screen-error" class="screen">
    <p class="error-text" id="error-msg"></p>
    <button class="btn-back" id="btn-retry">Prøv igjen</button>
  </div>
</div>

<div class="footer-stripe">
  <div class="footer-text">Gjett årstallet</div>
</div>

      document.getElementById(s).classList.toggle('active', s === id);
    });
  if (id !== 'screen-scan') stopScanner();
}

function showError(msg) {
  document.getElementById('error-msg').innerHTML = msg;
  show('screen-error');
}

function base64url(buf) {
  return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function doLogin() {
  var id = new URLSearchParams(location.search).get('id');
  if (id !== null) sessionStorage.setItem('song_id', id);
  var verifier = base64url(crypto.getRandomValues(new Uint8Array(48)));
  sessionStorage.setItem('pkce_verifier', verifier);
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)).then(function(hash) {
    var challenge = base64url(hash);
    var params = new URLSearchParams({
      response_type: 'code',
      client_id: CLIENT_ID,
      scope: 'streaming user-read-email user-read-private user-modify-playback-state user-read-playback-state playlist-read-private playlist-read-collaborative',
      redirect_uri: REDIRECT_URI,
      code_challenge_method: 'S256',
      code_challenge: challenge
    });
    location.href = 'https://accounts.spotify.com/authorize?' + params;
  });
}

function getToken(code) {
  return fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code: code,
      redirect_uri: REDIRECT_URI,
      client_id: CLIENT_ID,
      code_verifier: sessionStorage.getItem('pkce_verifier')
    })
  }).then(function(r) { return r.json(); });
}

function initPlayer(token) {
  accessToken = token;
  playSong();
  return Promise.resolve();
}

function playSong() {
  if (!currentSong) return;
  show('screen-loading');

  // Use real Spotify track ID directly - no search needed
  var uri = 'spotify:track:' + currentSong.id;

  // Get active device
  fetch('https://api.spotify.com/v1/me/player/devices', {
    headers: {'Authorization': 'Bearer ' + accessToken}
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    var devices = result.devices || [];
    var active  = devices.find(function(d) { return d.is_active; });
    var target  = active || devices[0];

    if (!target) {
      showError('Ingen Spotify-enhet funnet. Åpne Spotify-appen på telefonen og prøv igjen.');
      return;
    }

    return fetch('https://api.spotify.com/v1/me/player/play?device_id=' + target.id, {
      method: 'PUT',
      headers: {'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json'},
      body: JSON.stringify({uris: [uri]})
    })
    .then(function(r) {
      if (r.ok || r.status === 204) {
        show('screen-player');
      } else {
        // Fallback: play without device_id
        return fetch('https://api.spotify.com/v1/me/player/play', {
          method: 'PUT',
          headers: {'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json'},
          body: JSON.stringify({uris: [uri]})
        }).then(function(r2) {
          if (r2.ok || r2.status === 204) {
            show('screen-player');
          } else {
            r2.text().then(function(t) { showError('Spotify: ' + r2.status + ' – ' + t); });
          }
        });
      }
    });
  })
  .catch(function(e) { showError('Nettverksfeil: ' + e.message); });
}

// ── QR SCANNER ──
var scannerStream = null;
var scannerActive = false;

function stopScanner() {
  scannerActive = false;
  if (scannerStream) {
    scannerStream.getTracks().forEach(function(t){ t.stop(); });
    scannerStream = null;
  }
}

function startScanner() {
  show('screen-scan');
  scannerActive = true;
  var video   = document.getElementById('scanner-video');
  var canvas  = document.getElementById('scanner-canvas');
  var ctx     = canvas.getContext('2d');

  navigator.mediaDevices.getUserMedia({
    video: {facingMode: 'environment'},
    audio: false
  }).then(function(stream) {
    scannerStream = stream;
    video.srcObject = stream;
    video.play();
    requestAnimationFrame(scanFrame);
  }).catch(function(e) {
    showError('Kamera ikke tilgjengelig: ' + e.message);
  });

  function scanFrame() {
    if (!scannerActive) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code && code.data) {
        var url = code.data;
        var match = url.match(/[?&]id=(\d+)/);
        if (match) {
          var idx = parseInt(match[1], 10);
          if (idx >= 0 && idx < SONGS.length) {
            stopScanner();
            currentSong = SONGS[idx];
            sessionStorage.setItem('song_id', idx);
            playSong();
            return;
          }
        }
      }
    }
    requestAnimationFrame(scanFrame);
  }
}

// Knytt knapper til funksjoner
document.getElementById('btn-login').addEventListener('click', doLogin);

document.getElementById('btn-scan-home').addEventListener('click', startScanner);

document.getElementById('btn-dice').addEventListener('click', function() {
  // Animate dice
  var icon = document.getElementById('dice-icon');
  var faces = ['🎲','🎯','🎵','🎶','🎸','🥁'];
  var i = 0;
  icon.classList.add('rolling');
  var interval = setInterval(function() {
    icon.textContent = faces[i % faces.length];
    i++;
  }, 80);
  setTimeout(function() {
    clearInterval(interval);
    icon.classList.remove('rolling');
    icon.textContent = '🎲';
    // Pick random song
    var idx = Math.floor(Math.random() * SONGS.length);
    currentSong = SONGS[idx];
    sessionStorage.setItem('song_id', idx);
    playSong();
  }, 600);
});

document.getElementById('btn-next').addEventListener('click', function() { show('screen-home'); });
document.getElementById('btn-back').addEventListener('click', function() { show('screen-player'); });

document.getElementById('tap-area').addEventListener('click', function() {
  // Re-read from sessionStorage to be safe
  var safeIdx = parseInt(sessionStorage.getItem('song_id'), 10);
  var song = (!isNaN(safeIdx) && safeIdx >= 0 && safeIdx < SONGS.length)
    ? SONGS[safeIdx] : currentSong;
  document.getElementById('reveal-year').textContent   = song.year;
  document.getElementById('reveal-artist').textContent = song.artist;
  document.getElementById('reveal-title').textContent  = song.title;
  show('screen-reveal');
});

document.getElementById('btn-retry').addEventListener('click', function() {
  location.href = '?id=' + (sessionStorage.getItem('song_id') || '0');
});

// Start
(function init() {
  var params  = new URLSearchParams(location.search);
  var code    = params.get('code');
  var songId  = params.get('id') !== null ? params.get('id') : sessionStorage.getItem('song_id');
  var idx     = parseInt(songId, 10);

  // If ?id= is in URL, always use that (fresh QR scan) and clear old stored value
  if (params.get('id') !== null) {
    sessionStorage.setItem('song_id', idx);
  }

  currentSong = (!isNaN(idx) && idx >= 0 && idx < SONGS.length) ? SONGS[idx] : null;

  if (!currentSong) {
    showError('Ugyldig kort-ID (' + songId + '). Skann QR-koden på nytt.');
    return;
  }
  // Always save the confirmed idx so reveal uses the right song
  sessionStorage.setItem('song_id', idx);

  if (code) {
    show('screen-loading');
    getToken(code).then(function(token) {
      if (token.access_token) {
        sessionStorage.setItem('spotify_token', token.access_token);
        accessToken = token.access_token;
        history.replaceState({}, '', location.pathname);
        show('screen-home');
      } else {
        showError('Innlogging feilet: ' + (token.error_description || token.error || 'ukjent feil'));
      }
    }).catch(function(e) { showError('Feil: ' + e.message); });
    return;
  }

  // Clear old token to force fresh login with correct scopes
  var tokenVersion = sessionStorage.getItem('token_version');
  if (tokenVersion !== '3') {
    sessionStorage.removeItem('spotify_token');
    sessionStorage.setItem('token_version', '3');
  }

  var stored = sessionStorage.getItem('spotify_token');
  if (stored) {
    accessToken = stored;
    // If specific song requested via URL, play it directly
    if (params.get('id') !== null) {
      playSong();
    } else {
      show('screen-home');
    }
    return;
  }

  show('screen-login');
})();
</script>

}
