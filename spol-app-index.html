<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spol tilbake!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: #c8221a;
  font-family: Arial Rounded MT Bold, Arial Black, Arial, sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
}

/* ── Logo topp ── */
.logo {
  position: absolute;
  top: 0; left: 0; right: 0;
  background: #c8221a;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 0 0;
}
.logo-cream {
  background: #f5e8ce;
  color: #c8221a;
  font-size: 1.5rem;
  font-weight: 900;
  font-style: italic;
  padding: 5px 24px 6px;
  border-radius: 6px;
  letter-spacing: -0.5px;
}
.logo-sub {
  color: rgba(245,232,206,0.65);
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
  font-weight: 700;
  padding-bottom: 12px;
}

/* ── Grønn bunn-stripe ── */
.footer-stripe {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #2d5a27;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.footer-text {
  color: rgba(245,232,206,0.75);
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 900;
  font-style: italic;
}

/* ── Midtre innhold ── */
.main {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 100px 32px 60px;
  text-align: center;
}

/* ── Login-skjerm ── */
#screen-login .tagline {
  color: #f5e8ce;
  font-size: 1.1rem;
  font-weight: 900;
  font-style: italic;
  line-height: 1.4;
  margin-bottom: 8px;
}

.btn-spotify {
  background: #f5e8ce;
  color: #c8221a;
  border: none;
  border-radius: 50px;
  padding: 16px 36px;
  font-size: 1rem;
  font-weight: 900;
  font-style: italic;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  letter-spacing: 0.5px;
}
.btn-spotify:active { transform: scale(0.97); }

/* ── Spiller-skjerm ── */
#screen-player { display: none; width: 100%; }

.pulse-wrap {
  position: relative;
  width: 160px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pulse-ring {
  position: absolute;
  border-radius: 50%;
  background: rgba(245,232,206,0.15);
  animation: pulse 2s ease-out infinite;
}
.pulse-ring:nth-child(1) { width: 160px; height: 160px; animation-delay: 0s; }
.pulse-ring:nth-child(2) { width: 130px; height: 130px; animation-delay: 0.4s; }
.pulse-ring:nth-child(3) { width: 100px; height: 100px; animation-delay: 0.8s; }

@keyframes pulse {
  0%   { transform: scale(0.85); opacity: 0.6; }
  50%  { transform: scale(1.05); opacity: 0.3; }
  100% { transform: scale(0.85); opacity: 0.6; }
}

.note-icon {
  font-size: 3.5rem;
  color: #f5e8ce;
  position: relative;
  z-index: 2;
  animation: notebob 2s ease-in-out infinite;
}

@keyframes notebob {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

.hint-text {
  color: rgba(245,232,206,0.7);
  font-size: 0.8rem;
  font-weight: 700;
  font-style: italic;
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: blink 2.5s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 0.7; }
  50%       { opacity: 0.25; }
}

/* ── Avsløring ── */
#screen-reveal { display: none; width: 100%; }

.reveal-card {
  background: #f5e8ce;
  border-radius: 12px;
  padding: 28px 24px;
  width: 100%;
  max-width: 320px;
  margin: 0 auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
}

.reveal-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: #2d5a27;
}

.reveal-year {
  font-size: 3.2rem;
  font-weight: 900;
  font-style: italic;
  color: #c8221a;
  line-height: 1;
  letter-spacing: -2px;
}

.reveal-divider {
  height: 2px;
  background: repeating-linear-gradient(90deg, #2d5a27 0, #2d5a27 4px, transparent 4px, transparent 8px);
  margin: 14px 0;
  opacity: 0.4;
}

.reveal-artist {
  font-size: 0.75rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: #2d5a27;
  margin-bottom: 6px;
}

.reveal-title {
  font-size: 1.3rem;
  font-weight: 900;
  font-style: italic;
  color: #1a0800;
  line-height: 1.2;
}

.btn-back {
  background: transparent;
  border: 2px solid rgba(245,232,206,0.5);
  border-radius: 50px;
  padding: 12px 28px;
  color: #f5e8ce;
  font-size: 0.85rem;
  font-weight: 900;
  font-style: italic;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 1px;
  margin-top: 8px;
}
.btn-back:active { opacity: 0.7; }

/* ── Feil-skjerm ── */
#screen-error { display: none; }
.error-text {
  color: #f5e8ce;
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1.6;
  text-align: center;
}

/* ── Laster ── */
#screen-loading { display: none; }
.loading-text {
  color: rgba(245,232,206,0.8);
  font-size: 0.85rem;
  font-weight: 700;
  font-style: italic;
  letter-spacing: 2px;
  animation: blink 1.5s ease-in-out infinite;
}

.dot-wrap { display: flex; gap: 8px; }
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #f5e8ce;
  opacity: 0.4;
  animation: dotpop 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotpop {
  0%,100% { transform: scale(1); opacity: 0.4; }
  50%      { transform: scale(1.4); opacity: 1; }
}
</style>

  </div>

    </div>
    <div class="hint-text">Trykk for å avsløre</div>

      <div class="reveal-divider"></div>

    </div>

  <!-- FEIL -->
  <div id="screen-error">

    <br>

// ── PKCE OAuth helpers ──
async function sha256(plain) {
  const enc = new TextEncoder().encode(plain);
  const hash = await crypto.subtle.digest('SHA-256', enc);
  return hash;
}
function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function randomStr(len) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return base64url(arr);
}

async function startLogin() {
  const verifier  = randomStr(64);
  const challenge = base64url(await sha256(verifier));
  sessionStorage.setItem('pkce_verifier', verifier);

  const params = new URLSearchParams({
    response_type: 'code',
    client_id:     CLIENT_ID,
    scope:         'streaming user-read-email user-read-private user-modify-playback-state user-read-playback-state',
    redirect_uri:  REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge: challenge,
    state: location.search  // preserve ?id= param
  });
  location.href = 'https://accounts.spotify.com/authorize?' + params;
}

async function getToken(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type:    'authorization_code',
      code,
      redirect_uri:  REDIRECT_URI,
      client_id:     CLIENT_ID,
      code_verifier: verifier
    })
  });
  return res.json();
}

// ── Spotify Web Playback SDK ──
let player = null;
let deviceId = null;
let accessToken = null;
let currentSong = null;

function loadSDK() {
  return new Promise(resolve => {
    window.onSpotifyWebPlaybackSDKReady = resolve;
    const s = document.createElement('script');
    s.src = 'https://sdk.scdn.co/spotify-player.js';
    document.head.appendChild(s);
  });
}

async function initPlayer(token) {
  accessToken = token;
  await loadSDK();

  player = new Spotify.Player({
    name: 'Spol tilbake!',
    getOAuthToken: cb => cb(accessToken),
    volume: 0.8
  });

  player.addListener('ready', ({ device_id }) => {
    deviceId = device_id;
    playSong();
  });

  player.addListener('not_ready', () => {
    showError('Spotify-spilleren er ikke klar. Prøv å laste siden på nytt.');
  });

  player.addListener('authentication_error', () => {
    sessionStorage.removeItem('spotify_token');
    showError('Innlogging utløpt. <a onclick="location.reload()" style="color:#f5e8ce;cursor:pointer">Logg inn igjen</a>');
  });

  await player.connect();
}

async function playSong() {
  if (!currentSong || !deviceId) return;
  show('screen-loading');

  try {
    await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + accessToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ uris: [`spotify:track:${currentSong.id}`] })
    });
    show('screen-player');
  } catch(e) {
    showError('Kunne ikke spille av sangen. Sjekk at du har Spotify Premium.');
  }
}

// ── Skjerm-styring ──
function show(id) {
  ['screen-login','screen-loading','screen-player','screen-reveal','screen-error']
    .forEach(s => document.getElementById(s).style.display = s === id ? 'block' : 'none');
}

function showReveal() {
  document.getElementById('reveal-year').textContent   = currentSong.year;
  document.getElementById('reveal-artist').textContent = currentSong.artist;
  document.getElementById('reveal-title').textContent  = currentSong.title;
  show('screen-reveal');
}

function showPlayer() { show('screen-player'); }

function showError(msg) {
  document.getElementById('error-msg').innerHTML = msg;
  show('screen-error');
}

// ── Oppstart ──
async function init() {
  const params  = new URLSearchParams(location.search);
  const code    = params.get('code');
  const state   = params.get('state');
  const songId  = code
    ? new URLSearchParams(state).get('id')
    : params.get('id');

  // Find song
  const idx = parseInt(songId, 10);
  currentSong = (!isNaN(idx) && idx >= 0 && idx < SONGS.length) ? SONGS[idx] : null;

  if (!currentSong) {
    showError('Ugyldig kort-ID. Skann QR-koden på nytt.');
    return;
  }

  // Handle OAuth callback
  if (code) {
    show('screen-loading');
    history.replaceState({}, '', '?id=' + songId);
    try {
      const token = await getToken(code);
      if (token.access_token) {
        sessionStorage.setItem('spotify_token', token.access_token);
        await initPlayer(token.access_token);
      } else {
        showError('Innlogging feilet: ' + (token.error_description || token.error));
      }
    } catch(e) {
      showError('Nettverksfeil ved innlogging.');
    }
    return;
  }

  // Already logged in?
  const stored = sessionStorage.getItem('spotify_token');
  if (stored) {
    show('screen-loading');
    await initPlayer(stored);
    return;
  }

  // Show login
  show('screen-login');
}

init();
